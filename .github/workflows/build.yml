name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS Native Code
        run: npx expo prebuild --platform ios --no-install
        env:
          CI: 1

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Xcode Archive (Device ARM64)
        run: |
          cd ios
          xcodebuild -workspace Aero.xcworkspace \
                     -scheme Aero \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package .app into .ipa
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Aero-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aero-Unsigned-IPA
          path: Aero-Unsigned.ipa
          retention-days: 7