name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Patch @callstack/liquid-glass for Codegen compatibility
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const dir = "node_modules/@callstack/liquid-glass";
            function patch(dirPath) {
              if (!fs.existsSync(dirPath)) return;
              fs.readdirSync(dirPath).forEach(file => {
                const full = path.join(dirPath, file);
                if (fs.statSync(full).isDirectory()) {
                  patch(full);
                } else if (full.endsWith(".ts") || full.endsWith(".tsx") || full.endsWith(".js")) {
                  let content = fs.readFileSync(full, "utf8");
                  if (content.includes("CodegenTypes")) {
                    content = content.replace(/type CodegenTypes,?/g, "");
                    content = content.replace(/CodegenTypes\./g, "");
                    content = `import type { Float, Double, Int32, WithDefault } from "react-native/Libraries/Types/CodegenTypes";\n` + content;
                    fs.writeFileSync(full, content);
                    console.log("Patched for Codegen:", full);
                  }
                }
              });
            }
            patch(dir);
          '

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform ios --clean
        env:
          CI: '1'

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build Xcode App (Simulator Target)
        working-directory: ios
        run: |
          xcodebuild -workspace *.xcworkspace \
                     -scheme Aero \
                     -configuration Release \
                     -sdk iphonesimulator \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -R ios/build/Build/Products/Release-iphonesimulator/*.app Payload/
          zip -r Aero-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aero-Unsigned-IPA
          path: Aero-Unsigned.ipa
          retention-days: 7