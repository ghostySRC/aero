name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build Unsigned IPA locally on runner
        run: |
          eas build --platform ios --profile unsigned --local --non-interactive --output ./Aero-Unsigned.ipa
        env:
          EAS_NO_VCS: 1

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aero-Unsigned-IPA
          path: Aero-Unsigned.ipa
          retention-days: 7